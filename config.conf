# Dual Screen Touch Keeper - configuration
# Edit, then reboot (or run: su -c 'sh /data/adb/modules/ds_touch_keeper/service.sh &')

# Master switch. 0 = do nothing.
ENABLE=1

# Which USB devices to keep awake:
#   match = only devices whose VID:PID is in MATCH_IDS below (recommended -
#           lowest battery impact, targets just the touchscreen)
#   all   = every USB device (use if your accessory reports different IDs)
#   hid   = only devices exposing a HID interface
TARGET_MODE=match

# Space-separated list of vendor:product IDs to keep awake.
# 222a:0001 = "RDS Touchscreen" (Retroid Dual Screen Add-On) - CONFIRMED
# Add more pairs if you use other USB-C touch displays.
MATCH_IDS="222a:0001"

# Also set the KERNEL-WIDE default so newly plugged devices never
# autosuspend in the first place. 1 = yes, 0 = leave kernel default.
SET_GLOBAL_DEFAULT=1

# Watchdog: re-apply every N seconds. This is what catches the dual
# screen when you plug it in AFTER boot, since a freshly enumerated
# device gets the kernel default, not our setting.
# 0 disables the watchdog (boot-time only - not recommended).
POLL_INTERVAL=20

# Seconds to wait after boot before first pass.
BOOT_DELAY=25

# Log file size cap in KB before it gets trimmed.
LOG_MAX_KB=64

# Verbose: 1 logs every device touched (noisy, good for debugging),
# 0 logs only changes and errors.
VERBOSE=0
